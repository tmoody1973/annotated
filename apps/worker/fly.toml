# Fly.io config for the Annotated worker. Secrets (DEEPGRAM_API_KEY, CONVEX_URL,
# WORKER_AUTH_TOKEN) are set via `fly secrets set`, never committed.
# Deploy from the repo root:
#   fly deploy --config apps/worker/fly.toml --dockerfile apps/worker/Dockerfile .
app = "annotated-worker-rm"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle to keep cost minimal; first request cold-starts the
  # machine (boot + tsx transpile ≈ a few seconds). Set min_machines_running = 1
  # during a judging window if you want zero cold-start latency.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
